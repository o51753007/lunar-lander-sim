<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Lander - Enhanced Visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #010103; color: #00ff00; font-family: 'Consolas', monospace; }
        canvas { display: block; }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(0, 20, 0, 0.7);
            padding: 15px;
            border-left: 3px solid #00ff00;
            backdrop-filter: blur(4px);
        }
        .bar-container { width: 180px; height: 8px; background: #111; border: 1px solid #004400; margin-top: 4px; }
        .bar-fill { height: 100%; background: #00ff00; transition: width 0.1s; }
        #alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(0,0,0,0.9);
            padding: 2.5rem;
            border: 2px solid #ff0000;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="hud">
    <div class="text-xs text-gray-400">系統遙測 (TELEMETRY)</div>
    <div id="status" class="text-lg font-bold mb-2 text-green-400">DESCENT PHASE</div>
    
    <div class="grid grid-cols-2 gap-x-4 text-sm">
        <span>高度 (ALT):</span> <span id="val-alt" class="text-right">0 m</span>
        <span>水平速 (H-V):</span> <span id="val-vx" class="text-right">0 m/s</span>
        <span>垂直速 (V-V):</span> <span id="val-vy" class="text-right">0 m/s</span>
        <span>總質量 (MASS):</span> <span id="val-mass" class="text-right">0 kg</span>
    </div>

    <div class="mt-4">
        <div class="flex justify-between text-xs"><span>剩餘燃油 (FUEL)</span><span id="fuel-pc">100%</span></div>
        <div class="bar-container"><div id="fuel-bar" class="bar-fill"></div></div>
    </div>
    <div class="mt-2">
        <div class="flex justify-between text-xs"><span>主引擎推力 (THRUST)</span><span id="thrust-pc">0%</span></div>
        <div class="bar-container"><div id="thrust-bar" class="bar-fill"></div></div>
    </div>
</div>

<div id="alert">
    <h1 id="alert-title" class="text-4xl font-bold mb-4">系統異常</h1>
    <p id="alert-msg" class="mb-6 text-xl">機體結構受損。</p>
    <button onclick="resetSim()" class="bg-green-900 hover:bg-green-700 text-white px-8 py-3 border border-green-400 transition-colors">重新初始化系統 (REBOOT)</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // [Verified] Apollo LM 物理常數
    const G_MOON = 1.625;      
    const ISP = 311;           
    const G0 = 9.80665;        
    const T_MAX = 15500;       
    const M_DRY = 2150;        
    const M_FUEL_INIT = 2350;  
    const ROT_TORQUE = 13500;  
    
    let state, cam, keys, stars, surfacePoints;

    function initEnvironment() {
        // 生成遠景星辰
        stars = [];
        for(let i=0; i<300; i++) {
            stars.push({
                x: Math.random() * 4000 - 2000,
                y: Math.random() * 2000 - 1500,
                s: Math.random() * 2
            });
        }

        // 生成月表地形數據 (Procedural Terrain)
        surfacePoints = [];
        for(let x = -3000; x <= 3000; x += 40) {
            // 混合多層正弦波模擬崎嶇地形
            let y = Math.sin(x * 0.005) * 15 + Math.sin(x * 0.02) * 5 + (Math.random() * 2);
            surfacePoints.push({x, y});
        }
    }

    function resetSim() {
        state = {
            x: 0, y: -900, vx: 110, vy: 5,
            angle: 1.1, vrot: 0, thrustLevel: 0,
            fuel: M_FUEL_INIT, mass: M_DRY + M_FUEL_INIT,
            active: true, landed: false
        };
        cam = { x: 0, y: -400, zoom: 0.65 };
        keys = {};
        document.getElementById('alert').style.display = 'none';
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function update(dt) {
        if (!state.active || state.landed) return;

        // 1. 推力與燃料消耗
        if (keys['ArrowUp'] && state.fuel > 0) {
            state.thrustLevel = Math.min(state.thrustLevel + dt * 1.8, 1.0);
            const dm = (state.thrustLevel * T_MAX) / (ISP * G0) * dt;
            state.fuel = Math.max(0, state.fuel - dm);
        } else {
            state.thrustLevel = Math.max(state.thrustLevel - dt * 2.5, 0);
        }
        state.mass = M_DRY + state.fuel;

        // 2. RCS 姿勢控制
        if (keys['ArrowLeft']) state.vrot -= (ROT_TORQUE / state.mass) * dt;
        if (keys['ArrowRight']) state.vrot += (ROT_TORQUE / state.mass) * dt;
        state.vrot *= 0.95;
        state.angle += state.vrot * dt;

        // 3. 物理積分
        const thrustForce = state.thrustLevel * T_MAX;
        const ax = Math.sin(state.angle) * (thrustForce / state.mass);
        const ay = G_MOON - Math.cos(state.angle) * (thrustForce / state.mass);

        state.vx += ax * dt;
        state.vy += ay * dt;
        state.x += state.vx * dt;
        state.y += state.vy * dt;

        // 4. 地面碰撞檢查
        const terrainY = getTerrainHeight(state.x);
        if (state.y >= terrainY - 10) { // 考慮支架高度
            state.y = terrainY - 10;
            checkLanding();
        }

        // 5. 相機平滑跟隨 (Lag factor 0.08)
        cam.x += (state.x - cam.x) * 0.08;
        cam.y += (state.y - 150 - cam.y) * 0.08;
    }

    function getTerrainHeight(x) {
        const idx = Math.floor((x + 3000) / 40);
        if (idx >= 0 && idx < surfacePoints.length - 1) {
            // 線性插值取得精確高度
            const p1 = surfacePoints[idx];
            const p2 = surfacePoints[idx+1];
            const t = (x - p1.x) / (p2.x - p1.x);
            return p1.y + (p2.y - p1.y) * t;
        }
        return 0;
    }

    function checkLanding() {
        const hSpd = Math.abs(state.vx);
        const vSpd = Math.abs(state.vy);
        const angleErr = Math.abs(state.angle);

        if (vSpd < 7 && hSpd < 5 && angleErr < 0.18) {
            state.landed = true;
            showEnd('登陸成功 (TOUCHDOWN)', '靜海基地，老鷹號已成功降落。', '#00ff00');
        } else {
            state.active = false;
            showEnd('任務失敗 (CRASH)', `衝擊過大: V=${vSpd.toFixed(1)}m/s, H=${hSpd.toFixed(1)}m/s`, '#ff0000');
        }
    }

    function showEnd(title, msg, color) {
        const el = document.getElementById('alert');
        el.style.display = 'block';
        el.style.borderColor = color;
        document.getElementById('alert-title').innerText = title;
        document.getElementById('alert-title').style.color = color;
        document.getElementById('alert-msg').innerText = msg;
    }

    function draw() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // 背景色
        ctx.fillStyle = '#010103';
        ctx.fillRect(0,0,canvas.width, canvas.height);

        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(cam.zoom, cam.zoom);
        ctx.translate(-cam.x, -cam.y);

        // 1. 繪製星辰 (帶有些微視差效果)
        ctx.fillStyle = '#ffffff';
        stars.forEach(s => {
            const px = s.x + cam.x * 0.1; // 視差移位
            const py = s.y + cam.y * 0.1;
            ctx.beginPath();
            ctx.arc(px, py, s.s, 0, Math.PI*2);
            ctx.fill();
        });

        // 2. 繪製月球地表 (填充)
        ctx.fillStyle = '#1a1a1c';
        ctx.beginPath();
        ctx.moveTo(surfacePoints[0].x, 2000);
        surfacePoints.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.lineTo(surfacePoints[surfacePoints.length-1].x, 2000);
        ctx.closePath();
        ctx.fill();

        // 地表輪廓線
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 2;
        ctx.beginPath();
        surfacePoints.forEach((p, i) => {
            if(i===0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();

        // 3. 著陸目標區域標記 (Target Zone)
        ctx.strokeStyle = 'rgba(0, 255, 0, 0.4)';
        ctx.setLineDash([10, 10]);
        ctx.strokeRect(-100, -20, 200, 40);
        ctx.setLineDash([]);

        // 4. 登月艇
        ctx.save();
        ctx.translate(state.x, state.y);
        ctx.rotate(state.angle);

        if (state.active) {
            // 引擎噴火 (動態半透明)
            if (state.thrustLevel > 0.02) {
                const grad = ctx.createLinearGradient(0, 12, 0, 12 + state.thrustLevel * 60);
                grad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                grad.addColorStop(0.2, 'rgba(0, 200, 255, 0.6)');
                grad.addColorStop(1, 'rgba(0, 100, 255, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(-7, 12);
                ctx.lineTo(0, 12 + state.thrustLevel * 60 + Math.random()*15);
                ctx.lineTo(7, 12);
                ctx.fill();
            }
            
            // 船體渲染
            ctx.strokeStyle = state.landed ? '#00ff00' : '#d1d1d1';
            ctx.lineWidth = 2;
            // 指令艙/上升段
            ctx.beginPath();
            ctx.moveTo(0, -20); ctx.lineTo(14, 10); ctx.lineTo(-14, 10); ctx.closePath();
            ctx.stroke();
            // 下降段腳架
            ctx.beginPath();
            ctx.moveTo(-10, 10); ctx.lineTo(-20, 22); ctx.lineTo(-25, 22);
            ctx.moveTo(10, 10); ctx.lineTo(20, 22); ctx.lineTo(25, 22);
            ctx.stroke();
        } else {
            // 殘骸繪製
            ctx.fillStyle = '#555';
            for(let i=0; i<10; i++) ctx.fillRect(Math.random()*30-15, Math.random()*30-15, 3, 3);
        }
        ctx.restore();

        // 5. 下降預測軌跡 (Vector line)
        if(state.active && !state.landed) {
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.2)';
            ctx.beginPath();
            ctx.moveTo(state.x, state.y);
            ctx.lineTo(state.x + state.vx * 2, state.y + state.vy * 2);
            ctx.stroke();
        }

        ctx.restore();

        // HUD 更新
        document.getElementById('val-alt').innerText = `${Math.abs(state.y - getTerrainHeight(state.x)).toFixed(0)} m`;
        document.getElementById('val-vx').innerText = `${state.vx.toFixed(1)} m/s`;
        document.getElementById('val-vy').innerText = `${state.vy.toFixed(1)} m/s`;
        document.getElementById('val-mass').innerText = `${Math.round(state.mass)} kg`;
        
        const fPc = (state.fuel / M_FUEL_INIT) * 100;
        document.getElementById('fuel-pc').innerText = `${fPc.toFixed(1)}%`;
        document.getElementById('fuel-bar').style.width = `${fPc}%`;
        document.getElementById('fuel-bar').style.background = fPc < 15 ? '#ff0000' : '#00ff00';
        
        document.getElementById('thrust-pc').innerText = `${(state.thrustLevel*100).toFixed(0)}%`;
        document.getElementById('thrust-bar').style.width = `${state.thrustLevel*100}%`;
    }

    let last = 0;
    function frame(t) {
        const dt = Math.min((t - last) / 1000, 0.05);
        last = t;
        update(dt);
        draw();
        requestAnimationFrame(frame);
    }

    initEnvironment();
    resetSim();
    requestAnimationFrame(frame);
</script>
</body>
</html>
